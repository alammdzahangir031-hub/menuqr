<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Waiter — MenuQR</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2C742F;--green3:#3A9E3F;
  --grad:linear-gradient(135deg,#2C742F,#3A9E3F);
  --orange:#E8620A;
  --bg:#0D0D0D;--surface:#1A1A1A;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#F1F5F9;--text2:#94A3B8;--muted:#475569;
  --new-bg:rgba(59,130,246,0.1);--new-text:#93C5FD;--new-dim:rgba(59,130,246,0.3);
  --prep-bg:rgba(249,115,22,0.1);--prep-text:#FDB87A;--prep-dim:rgba(249,115,22,0.3);
  --ready-bg:rgba(34,197,94,0.12);--ready-text:#86EFAC;--ready-dim:rgba(34,197,94,0.4);
}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
#topbar{background:#080808;border-bottom:1px solid rgba(44,116,47,0.2);padding:0 14px;display:flex;align-items:center;gap:10px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.6)}
.tb-logo{width:34px;height:34px;border-radius:9px;object-fit:cover;flex-shrink:0}
.tb-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.tb-who{flex:1;min-width:0}
.tb-who-name{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-who-role{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.1em}
.tb-rest{font-size:11px;font-weight:600;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:7px;padding:4px 9px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:#EF4444;transition:background .3s}
.live-dot.on{background:#22C55E}
.live-text{font-size:10px;font-weight:800;color:#94A3B8;text-transform:uppercase;letter-spacing:0.1em}

/* READY ALERT */
#ready-banner{position:fixed;top:58px;left:0;right:0;z-index:200;display:none;flex-direction:column}
#ready-banner.show{display:flex}
.ready-item{background:linear-gradient(90deg,#14532D,#15803D);border-bottom:2px solid rgba(74,222,128,0.4);padding:14px 16px;display:flex;align-items:center;gap:12px;animation:sldn .35s cubic-bezier(.34,1.1,.64,1)}
@keyframes sldn{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.ri-icon{font-size:28px;flex-shrink:0;animation:wgl .6s ease infinite}
@keyframes wgl{0%,100%{transform:rotate(0)}30%{transform:rotate(-10deg)}70%{transform:rotate(10deg)}}
.ri-body{flex:1}
.ri-title{font-size:16px;font-weight:900;color:#fff;font-family:'Hind Siliguri',sans-serif}
.ri-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:600}
.ri-btn{background:#22C55E;border:none;color:#fff;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Jost',sans-serif;white-space:nowrap;flex-shrink:0;box-shadow:0 3px 10px rgba(34,197,94,.4)}

/* NEW ORDER FLASH */
#new-flash{position:fixed;top:58px;left:0;right:0;z-index:190;background:linear-gradient(90deg,#1E3A8A,#1D4ED8);padding:10px 16px;display:none;align-items:center;gap:10px;border-bottom:1px solid rgba(99,143,255,.3)}
#new-flash.show{display:flex}
.nf-text{flex:1;font-size:13px;font-weight:800;color:#fff}
.nf-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Jost',sans-serif}

/* TAB BAR */
.tab-bar{background:#0A0A0A;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:90}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Jost',sans-serif;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s}
.tab-btn.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(44,116,47,.3)}
.tab-btn.active-ready{background:linear-gradient(135deg,#15803D,#22C55E);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(34,197,94,.4)}
.tab-count{background:rgba(255,255,255,.2);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:800}

/* CARDS */
#orders-wrap{padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.order-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .2s}
.order-card.status-new{border-color:var(--new-dim)}
.order-card.status-confirmed{border-color:var(--new-dim)}
.order-card.status-preparing{border-color:var(--prep-dim)}
.order-card.status-ready{border-color:var(--ready-dim);box-shadow:0 0 20px rgba(34,197,94,.15)}
.order-card.status-served{opacity:.7}
.card-head{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px}
.card-table{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1}
.card-meta{flex:1}
.card-id{font-size:11px;font-weight:700;color:var(--muted);margin-top:2px}
.card-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.status-new .card-pill,.status-confirmed .card-pill{background:var(--new-bg);color:var(--new-text)}
.status-preparing .card-pill{background:var(--prep-bg);color:var(--prep-text)}
.status-ready .card-pill{background:var(--ready-bg);color:var(--ready-text);animation:rpulse 1.5s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.status-served .card-pill{background:rgba(255,255,255,.05);color:var(--muted)}
.card-items{padding:0 14px 12px;display:flex;flex-direction:column;gap:5px}
.ci-row{display:flex;align-items:center;gap:8px}
.ci-qty{font-size:16px;font-weight:900;color:var(--orange);min-width:26px}
.ci-name{font-size:14px;font-weight:700;color:var(--text);font-family:'Hind Siliguri',sans-serif}
.card-note{margin:0 14px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2);font-style:italic}
.card-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.foot-label{font-size:11px;color:var(--muted);font-weight:600}
.foot-total{font-size:16px;font-weight:900;color:var(--text)}
.serve-btn{width:100%;padding:14px;border:none;border-radius:0 0 14px 14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.serve-btn:active{transform:scale(.98)}
.btn-serve{background:linear-gradient(135deg,#15803D,#22C55E);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.3)}
.btn-pay{background:linear-gradient(135deg,#92400E,#F59E0B);color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3)}
.serve-btn:disabled{opacity:.5;cursor:not-allowed}
.status-info{padding:12px 14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--muted);border-top:1px solid var(--border)}
.empty-wrap{text-align:center;padding:60px 24px}
.empty-emoji{font-size:52px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.6}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E293B;color:#F1F5F9;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:380px){.ri-title{font-size:14px}.serve-btn{font-size:14px;padding:12px}}
</style>
</head>
<body>
<div id="topbar">
  <img class="tb-logo" src="menuqr-logo.svg" alt="MenuQR">
  <div class="tb-sep"></div>
  <div class="tb-who">
    <div class="tb-who-name" id="tb-name">Staff</div>
    <div class="tb-who-role" id="tb-role">Waiter</div>
  </div>
  <div class="live-badge">
    <div class="live-dot" id="live-dot"></div>
    <span class="live-text" id="live-text">Connecting</span>
  </div>
  <div class="tb-rest" id="tb-rest">...</div>
</div>

<div id="ready-banner"></div>
<div id="new-flash">
  <span style="font-size:18px;flex-shrink:0">🛎️</span>
  <div class="nf-text" id="nf-text">নতুন অর্ডার!</div>
  <button class="nf-close" onclick="hideNewFlash()">✓</button>
</div>

<div class="tab-bar" id="tab-bar"></div>
<div id="orders-wrap"><div class="empty-wrap"><div class="empty-emoji">⏳</div><div class="empty-title">লোড হচ্ছে...</div></div></div>
<div id="toast"></div>

<script>
const SUPA_URL='https://jkskdvvisfmezcqvamfy.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imprc2tkdnZpc2ZtZXpjcXZhbWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTYzNzMsImV4cCI6MjA4ODI3MjM3M30.AxQwKmgaMdRcGyVXDPkZwnjTTqWk9nku0EvCpE37Ve4';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const params=new URLSearchParams(window.location.search);
const slug=params.get('r')||'';
const staffName=decodeURIComponent(params.get('name')||'Staff');
const isCashier=params.get('mode')==='cashier';

let restaurantId='';
let orders=[];
let currentTab=isCashier?'payment':'ready';
let prevNewIds=new Set();
let prevReadyIds=new Set();

const STATUS_BN={new:'নতুন',confirmed:'কনফার্ম',preparing:'রান্না হচ্ছে',ready:'রেডি ✅',served:'সার্ভ হয়েছে',completed:'সম্পন্ন'};

/* INIT */
window.addEventListener('DOMContentLoaded',async()=>{
  document.getElementById('tb-name').textContent=staffName;
  document.getElementById('tb-role').textContent=isCashier?'Cashier 💰':'Waiter 🙋';
  buildTabs();
  if(!slug){showEmpty('লিংক সমস্যা','ড্যাশবোর্ড থেকে সঠিক লিংক নিন');return;}
  const{data:rest}=await sb.from('restaurants').select('id,name').eq('slug',slug).maybeSingle();
  if(!rest){showEmpty('রেস্টুরেন্ট পাওয়া যায়নি','');return;}
  restaurantId=rest.id;
  document.getElementById('tb-rest').textContent=rest.name;
  document.title=rest.name+' — '+(isCashier?'Cashier':'Waiter');
  await fetchOrders();
  startRealtime();
  setInterval(fetchOrders,15000);
});

/* TABS */
function buildTabs(){
  const bar=document.getElementById('tab-bar');
  if(isCashier){
    bar.innerHTML=`
      <button class="tab-btn active" onclick="switchTab('payment',this)">💰 পেমেন্ট নিন <span class="tab-count" id="cnt-payment">0</span></button>
      <button class="tab-btn" onclick="switchTab('all',this)">📋 সব <span class="tab-count" id="cnt-all">0</span></button>`;
  } else {
    bar.innerHTML=`
      <button class="tab-btn active-ready active" onclick="switchTab('ready',this)">🍽️ Serve করুন <span class="tab-count" id="cnt-ready">0</span></button>
      <button class="tab-btn" onclick="switchTab('cooking',this)">🍳 রান্না হচ্ছে <span class="tab-count" id="cnt-cooking">0</span></button>
      <button class="tab-btn" onclick="switchTab('new',this)">🛎️ নতুন <span class="tab-count" id="cnt-new">0</span></button>
      <button class="tab-btn" onclick="switchTab('served',this)">✅ সার্ভড <span class="tab-count" id="cnt-served">0</span></button>`;
  }
}

/* FETCH */
async function fetchOrders(){
  if(!restaurantId)return;
  const{data,error}=await sb.from('orders')
    .select('*,order_items(item_name,quantity,item_name_bn)')
    .eq('restaurant_id',restaurantId)
    .in('status',['new','confirmed','preparing','ready','served','completed'])
    .order('created_at',{ascending:false})
    .limit(100);
  if(error||!data)return;

  /* Detect NEW orders — notify waiter (read-only info) */
  const nowNewIds=new Set(data.filter(o=>o.status==='new').map(o=>o.id));
  if(prevNewIds.size>0){
    for(const id of nowNewIds){
      if(!prevNewIds.has(id)){
        const o=data.find(x=>x.id===id);
        if(o) notifyNewOrder(o);
        break;
      }
    }
  }
  prevNewIds=nowNewIds;

  /* Detect READY orders — LOUD alert for waiter */
  if(!isCashier){
    const nowReadyIds=new Set(data.filter(o=>o.status==='ready').map(o=>o.id));
    for(const id of nowReadyIds){
      if(!prevReadyIds.has(id)){
        const o=data.find(x=>x.id===id);
        if(o) showReadyAlert(o);
      }
    }
    prevReadyIds=nowReadyIds;
  }

  orders=data;
  updateCounts();
  renderOrders();
}

/* NEW ORDER — soft info notification */
function notifyNewOrder(order){
  playBeep(440,0.2,0.4);
  const items=(order.order_items||[]).map(i=>i.item_name_bn||i.item_name).slice(0,3).join(', ');
  document.getElementById('nf-text').textContent=
    'টেবিল '+order.table_number+' — নতুন অর্ডার: '+items;
  document.getElementById('new-flash').classList.add('show');
  setTimeout(hideNewFlash,7000);
}

/* READY — LOUD alert */
function showReadyAlert(order){
  /* 3x beep — loud */
  playBeep(880,0.6,0.25);
  setTimeout(()=>playBeep(880,0.6,0.25),350);
  setTimeout(()=>playBeep(1100,0.7,0.4),700);

  const banner=document.getElementById('ready-banner');
  const alertId='ra-'+order.id;
  if(document.getElementById(alertId))return;

  const items=(order.order_items||[]).map(i=>'x'+i.quantity+' '+(i.item_name_bn||i.item_name)).join(' · ');
  const div=document.createElement('div');
  div.className='ready-item';
  div.id=alertId;
  div.innerHTML=`
    <div class="ri-icon">🍽️</div>
    <div class="ri-body">
      <div class="ri-title">টেবিল ${order.table_number} রেডি! এখনই নিয়ে যান</div>
      <div class="ri-sub">${items}</div>
    </div>
    <button class="ri-btn" onclick="dismissReady('${order.id}')">নিলাম ✓</button>`;
  banner.appendChild(div);
  banner.classList.add('show');
}

function dismissReady(id){
  const el=document.getElementById('ra-'+id);
  if(el)el.remove();
  const b=document.getElementById('ready-banner');
  if(!b.children.length)b.classList.remove('show');
}

function hideNewFlash(){document.getElementById('new-flash').classList.remove('show');}

function playBeep(freq,vol,dur){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}

/* RENDER */
function renderOrders(){
  const wrap=document.getElementById('orders-wrap');
  let filtered=[];
  if(currentTab==='ready')          filtered=orders.filter(o=>o.status==='ready');
  else if(currentTab==='cooking')   filtered=orders.filter(o=>['confirmed','preparing'].includes(o.status));
  else if(currentTab==='new')       filtered=orders.filter(o=>o.status==='new');
  else if(currentTab==='served')    filtered=orders.filter(o=>o.status==='served');
  else if(currentTab==='payment')   filtered=orders.filter(o=>o.status==='served');
  else                              filtered=orders;

  const empty={
    ready:{e:'✅',t:'কোনো রেডি অর্ডার নেই',s:'কিচেন রেডি করলে এখানে আসবে ও beep বাজবে'},
    cooking:{e:'🍳',t:'এখন রান্না হচ্ছে না',s:''},
    new:{e:'🛎️',t:'নতুন অর্ডার নেই',s:''},
    served:{e:'🎉',t:'Served অর্ডার নেই',s:''},
    payment:{e:'💰',t:'পেমেন্ট বাকি নেই',s:''},
    all:{e:'🍽️',t:'কোনো অর্ডার নেই',s:''},
  };

  if(!filtered.length){
    const m=empty[currentTab]||empty.all;
    wrap.innerHTML=`<div class="empty-wrap"><div class="empty-emoji">${m.e}</div><div class="empty-title">${m.t}</div><div class="empty-sub">${m.s}</div></div>`;
    return;
  }

  wrap.innerHTML=filtered.map(o=>{
    const items=o.order_items||[];
    const orderNum=o.order_number||('#'+o.id.slice(0,6));
    const timeAgo=getTimeAgo(o.created_at);
    const total=parseFloat(o.total||0).toFixed(0);

    const itemsHtml=items.map(i=>`<div class="ci-row"><span class="ci-qty">x${i.quantity}</span><span class="ci-name">${i.item_name_bn||i.item_name}</span></div>`).join('');
    const noteHtml=o.special_note?`<div class="card-note">📝 ${o.special_note}</div>`:'';

    /* Action — only serve for waiter+ready, pay for cashier+served */
    let actionHtml='';
    if(!isCashier && o.status==='ready'){
      actionHtml=`<button class="serve-btn btn-serve" onclick="markServed('${o.id}')">🍽️ টেবিলে দিয়ে এলাম</button>`;
    } else if(isCashier && o.status==='served'){
      actionHtml=`<button class="serve-btn btn-pay" onclick="markPaid('${o.id}')">💰 ৳${total} — পেমেন্ট নিলাম</button>`;
    } else if(!isCashier){
      const msg={new:'🛎️ নতুন — কিচেন দেখছে',confirmed:'✅ কনফার্ম হয়েছে',preparing:'🍳 রান্না হচ্ছে...',served:'✅ সার্ভ হয়েছে'};
      actionHtml=`<div class="status-info">${msg[o.status]||''}</div>`;
    }

    return `<div class="order-card status-${o.status}">
      <div class="card-head">
        <div class="card-meta">
          <div class="card-table">টেবিল ${o.table_number}</div>
          <div class="card-id">${orderNum} · ${items.length}টি আইটেম · ${timeAgo}</div>
        </div>
        <div class="card-pill">${STATUS_BN[o.status]||o.status}</div>
      </div>
      <div class="card-items">${itemsHtml}</div>
      ${noteHtml}
      <div class="card-foot"><span class="foot-label">মোট</span><span class="foot-total">৳${total}</span></div>
      ${actionHtml}
    </div>`;
  }).join('');
}

/* COUNTS */
function updateCounts(){
  const s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  s('cnt-ready',  orders.filter(o=>o.status==='ready').length);
  s('cnt-cooking',orders.filter(o=>['confirmed','preparing'].includes(o.status)).length);
  s('cnt-new',    orders.filter(o=>o.status==='new').length);
  s('cnt-served', orders.filter(o=>o.status==='served').length);
  s('cnt-payment',orders.filter(o=>o.status==='served').length);
  s('cnt-all',    orders.length);
}

/* ACTIONS */
async function markServed(id){
  const btn=document.querySelector(`[onclick="markServed('${id}')"]`);
  if(btn){btn.disabled=true;btn.textContent='⏳...';}
  const{error}=await sb.from('orders').update({status:'served'}).eq('id',id);
  if(error){showToast('Error: '+error.message);if(btn){btn.disabled=false;btn.textContent='🍽️ টেবিলে দিয়ে এলাম';}return;}
  dismissReady(id);
  showToast('✅ সার্ভ হয়েছে!');
  await fetchOrders();
}

async function markPaid(id){
  const btn=document.querySelector(`[onclick="markPaid('${id}')"]`);
  if(btn){btn.disabled=true;btn.textContent='⏳...';}
  const{error}=await sb.from('orders').update({status:'completed'}).eq('id',id);
  if(error){showToast('Error: '+error.message);return;}
  showToast('💰 পেমেন্ট সম্পন্ন!');
  await fetchOrders();
}

/* TABS */
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active','active-ready'));
  if(btn)btn.classList.add(tab==='ready'?'active-ready':'active');
  renderOrders();
}

/* REALTIME */
function startRealtime(){
  sb.channel('waiter-'+restaurantId)
    .on('postgres_changes',{event:'*',schema:'public',table:'orders',filter:`restaurant_id=eq.${restaurantId}`},()=>fetchOrders())
    .subscribe(st=>{
      const dot=document.getElementById('live-dot');
      const txt=document.getElementById('live-text');
      if(st==='SUBSCRIBED'){dot.classList.add('on');txt.textContent='Live';}
      else{dot.classList.remove('on');txt.textContent='...';}
    });
}

/* HELPERS */
function getTimeAgo(ts){
  const m=Math.floor((Date.now()-new Date(ts))/60000);
  if(m<1)return'এখনই';if(m<60)return m+' মিনিট আগে';
  return Math.floor(m/60)+' ঘণ্টা আগে';
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
function showEmpty(title,sub){
  document.getElementById('orders-wrap').innerHTML=`<div class="empty-wrap"><div class="empty-emoji">⚠️</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}
</script>
