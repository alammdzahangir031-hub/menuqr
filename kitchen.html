<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0D0D">
<title>Kitchen Display — MenuQR</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,700&family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   KITCHEN DISPLAY — SAVORELLE THEME
   Dark luxury · High contrast · Readable from distance
═══════════════════════════════════════════ */
:root {
  --bg:#0D0D0D; --bg2:#111111; --surface:#181818;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --new:#3B82F6; --new-bg:rgba(59,130,246,0.08); --new-text:#93C5FD; --new-dim:rgba(59,130,246,0.3);
  --prep:#E8620A; --prep-bg:rgba(232,98,10,0.08); --prep-text:#FDB57A; --prep-dim:rgba(232,98,10,0.3);
  --ready:#22C55E; --ready-bg:rgba(34,197,94,0.08); --ready-text:#86EFAC; --ready-dim:rgba(34,197,94,0.3);
  --orange:#E8620A; --red:#F43F5E; --gold:#FCD34D;
  --fh:'Playfair Display',Georgia,serif;
  --fb:'DM Sans',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:#F1F5F9;min-height:100vh;-webkit-font-smoothing:antialiased;user-select:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(232,98,10,0.4);border-radius:2px}

/* ── TOPBAR ── */
/* ── TOPBAR ── */
#topbar{
  background:#080808;
  border-bottom:1px solid rgba(249,115,22,0.15);
  padding:0 20px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:16px;
  height:68px;
  position:sticky;top:0;z-index:100;
  overflow:visible;
  box-shadow:0 2px 24px rgba(0,0,0,0.7);
}

/* LEFT */
.tb-left{display:flex;align-items:center;gap:12px;min-width:0;flex-shrink:0}
.tb-logo-icon{width:42px;height:42px;border-radius:12px;flex-shrink:0;overflow:hidden}
.tb-brand{display:flex;flex-direction:column;min-width:0}
.tb-brand-name{font-family:var(--fh);font-size:18px;font-weight:800;color:#F5F0E8;letter-spacing:-0.01em;line-height:1.1;white-space:nowrap}
.tb-brand-name span{color:var(--orange)}
.tb-restaurant-name{font-size:11px;font-weight:600;color:#6B5D4F;text-transform:uppercase;letter-spacing:0.1em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}

/* CENTER — stat pills */
.tb-stats{display:flex;align-items:center;justify-content:center;gap:8px}
.tb-stat-pill{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 16px;border-radius:12px;border:1px solid var(--border2);
  min-width:68px;gap:2px;
}
.tb-stat-pill.new-pill{background:var(--new-bg);border-color:var(--new-dim)}
.tb-stat-pill.prep-pill{background:var(--prep-bg);border-color:var(--prep-dim)}
.tb-stat-pill.ready-pill{background:var(--ready-bg);border-color:var(--ready-dim)}
.tb-stat-pill.total-pill{background:rgba(255,255,255,0.03)}
.tb-stat-num{font-family:var(--fh);font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.02em}
.new-pill .tb-stat-num{color:var(--new-text)}
.prep-pill .tb-stat-num{color:var(--prep-text)}
.ready-pill .tb-stat-num{color:var(--ready-text)}
.total-pill .tb-stat-num{color:#94A3B8}
.tb-stat-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;font-family:var(--fb)}
.new-pill .tb-stat-label{color:rgba(147,197,253,0.55)}
.prep-pill .tb-stat-label{color:rgba(253,181,122,0.55)}
.ready-pill .tb-stat-label{color:rgba(134,239,172,0.55)}
.total-pill .tb-stat-label{color:#475569}

/* RIGHT */
.tb-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-clock-wrap{text-align:right}
.tb-clock{font-family:var(--fh);font-size:24px;font-weight:800;color:#F5F0E8;letter-spacing:0.03em;line-height:1}
.tb-date{font-size:10px;color:#4A3E35;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin-top:2px}
.tb-live{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:6px 10px;font-size:10px;font-weight:800;color:#22C55E;text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;animation:livePulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes audioNotice{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}}
.tb-lang-toggle{display:flex;border-radius:9px;overflow:hidden;border:1.5px solid rgba(249,115,22,0.3)}
.tb-lang-toggle button{padding:6px 12px;background:transparent;color:var(--orange);border:none;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1}
.tb-lang-toggle button.active-lang{background:var(--orange);color:#fff}
.tb-sound-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#64748B;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tb-sound-btn:hover{background:#222;color:#F1F5F9}
.tb-sound-btn.muted{color:#2a2a2a}
.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-slider{-webkit-appearance:none;width:70px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 2px 6px rgba(232,98,10,0.5)}

/* ── NEW ORDER BANNER — below topbar, not overlapping ── */
#new-order-flash{
  position:fixed;
  top:68px; left:0; right:0;
  z-index:90;
  background:linear-gradient(90deg,#1D3A8A,#1E40AF);
  border-bottom:2px solid rgba(59,130,246,0.4);
  padding:12px 28px;
  font-family:var(--fh);font-size:22px;font-weight:700;
  color:#fff;letter-spacing:0.03em;
  display:flex;align-items:center;gap:14px;
  transform:translateY(-100%);
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;
  box-shadow:0 4px 24px rgba(59,130,246,0.3);
}
#new-order-flash.show{transform:translateY(0)}
#new-order-flash .flash-icon{font-size:26px;animation:bellRing 0.5s ease-in-out 2}
@keyframes bellRing{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
#new-order-flash .flash-close{margin-left:auto;font-size:18px;opacity:0.7;cursor:pointer;pointer-events:all}

/* ── BOARD ── */
#board{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  height:calc(100vh - 68px);
  overflow:hidden;
}
.col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;position:relative}
.col:last-child{border-right:none}

.col-header{padding:16px 20px;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-new   .col-header{border-color:var(--new); background:var(--new-bg)}
.col-prep  .col-header{border-color:var(--prep); background:var(--prep-bg)}
.col-ready .col-header{border-color:var(--ready);background:var(--ready-bg)}

.col-title{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:0.01em;display:flex;align-items:center;gap:10px}
.col-new   .col-title{color:var(--new-text)}
.col-prep  .col-title{color:var(--prep-text)}
.col-ready .col-title{color:var(--ready-text)}
.col-icon{font-size:18px}

.col-count{font-family:var(--fh);font-size:28px;font-weight:700;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.col-new   .col-count{background:var(--new-bg);color:var(--new-text);border:1px solid var(--new-dim)}
.col-prep  .col-count{background:var(--prep-bg);color:var(--prep-text);border:1px solid var(--prep-dim)}
.col-ready .col-count{background:var(--ready-bg);color:var(--ready-text);border:1px solid var(--ready-dim)}

.col-body{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px}

/* ── ORDER CARD ── */
.order-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;overflow:hidden;animation:cardIn 0.35s cubic-bezier(.34,1.56,.64,1);transition:transform .18s,box-shadow .18s;cursor:pointer}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.45)}
@keyframes cardIn{from{opacity:0;transform:translateY(-18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.col-new  .order-card{border-color:var(--new-dim)}
.col-prep .order-card{border-color:var(--prep-dim)}
.col-ready .order-card{border-color:var(--ready-dim)}
.col-new .order-card.urgent{animation:cardIn .35s cubic-bezier(.34,1.56,.64,1),glowNew 1.8s ease-in-out .4s 3}
@keyframes glowNew{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}50%{box-shadow:0 0 16px 4px rgba(59,130,246,.2)}}

.card-strip{height:4px}
.col-new  .card-strip{background:linear-gradient(90deg,#1D4ED8,var(--new))}
.col-prep .card-strip{background:linear-gradient(90deg,#9A3C06,var(--prep))}
.col-ready .card-strip{background:linear-gradient(90deg,#14532D,var(--ready))}

.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
.card-order-num{font-family:var(--fm);font-size:13px;font-weight:700;letter-spacing:0.06em;color:#64748B}
.card-table-badge{font-family:var(--fh);font-size:24px;font-weight:700;letter-spacing:-0.01em}
.col-new   .card-table-badge{color:var(--new-text)}
.col-prep  .card-table-badge{color:var(--prep-text)}
.col-ready .card-table-badge{color:var(--ready-text)}

.card-meta{display:flex;align-items:center;gap:10px;padding:0 16px 10px;font-size:12px;color:#475569}
.card-time-ago{font-weight:700;display:flex;align-items:center;gap:4px;font-size:13px}
.card-time-ago.warn{color:var(--gold)}
.card-time-ago.late{color:var(--red)}
.card-items-count{background:rgba(255,255,255,0.05);border-radius:6px;padding:2px 9px;font-size:12px;font-weight:600;color:#475569}

/* ITEMS — core readability */
.card-items{padding:4px 16px 14px;border-bottom:1px solid var(--border)}
.card-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.card-item:last-child{border-bottom:none}
.card-item-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.card-item-emoji{font-size:24px;flex-shrink:0}
.card-item-name{font-family:var(--fb);font-size:18px;font-weight:700;color:#F1F5F9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:0.02em}
.card-item-qty{font-family:var(--fh);font-size:32px;font-weight:700;color:var(--orange);flex-shrink:0;min-width:40px;text-align:right;line-height:1;letter-spacing:-0.02em}

/* note */
.card-note{margin:0 16px 12px;background:rgba(252,211,77,.06);border:1px solid rgba(252,211,77,.2);border-radius:10px;padding:10px 13px;font-family:var(--fb);font-size:13px;font-weight:600;color:#FDE68A;display:flex;align-items:flex-start;gap:8px}
.card-note-icon{font-size:15px;flex-shrink:0}

/* action buttons */
.card-actions{display:grid;gap:8px;padding:10px 13px 13px}
.card-actions.two{grid-template-columns:1fr 1fr}
.card-actions.one{grid-template-columns:1fr}
.action-btn{padding:13px 8px;border-radius:11px;border:none;cursor:pointer;font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.action-btn:active{transform:scale(.95)}
.btn-start{background:rgba(232,98,10,0.15);color:var(--prep-text);border:1px solid var(--prep-dim)}
.btn-start:hover{background:var(--prep);color:#fff;border-color:transparent}
.btn-ready{background:rgba(34,197,94,0.12);color:var(--ready-text);border:1px solid var(--ready-dim)}
.btn-ready:hover{background:var(--ready);color:#fff;border-color:transparent}
.btn-served{background:transparent;color:#475569;border:1px solid rgba(255,255,255,0.08)}
.btn-served:hover{background:rgba(255,255,255,0.05);color:#94A3B8}
.btn-wa{background:rgba(37,211,102,0.12);color:#25D366;border:1px solid rgba(37,211,102,0.25)}
.btn-wa:hover{background:#25D366;color:#fff;border-color:transparent}
.btn-wa.wa-sent{background:rgba(37,211,102,0.06);color:#16A34A;border:1px solid rgba(37,211,102,0.2);font-size:13px}
.btn-wa.wa-sent:hover{background:#25D366;color:#fff}
.btn-back{background:transparent;color:#374151;border:1px solid rgba(255,255,255,0.06);font-size:14px}
.btn-back:hover{background:rgba(255,255,255,0.04);color:#64748B}

/* empty col */
.col-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:#2A2A2A;text-align:center;flex:1}
.col-empty-icon{font-size:44px;margin-bottom:14px;opacity:.2}
.col-empty-text{font-family:var(--fh);font-size:18px;text-transform:uppercase;letter-spacing:.1em;opacity:.25;color:#FFF}

/* no-orders overlay */
#no-orders-overlay{position:fixed;inset:68px 0 0 0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:18px;transition:opacity .5s}
#no-orders-overlay.hidden{opacity:0;pointer-events:none}
.no-orders-emoji{font-size:80px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.no-orders-title{font-family:var(--fh);font-size:36px;font-weight:700;letter-spacing:-0.01em;text-transform:uppercase;color:#2A2A2A}
.no-orders-sub{font-size:15px;color:#333;font-family:var(--fb)}
.no-orders-hint{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:14px 22px;font-size:14px;color:#444;font-family:var(--fb);display:flex;align-items:center;gap:10px}

/* test btn */
#test-btn{position:fixed;bottom:22px;right:22px;z-index:200;background:var(--surface);border:1px solid var(--border2);color:#555;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;font-family:var(--fh)}
#test-btn:hover{background:var(--orange);color:#fff;border-color:transparent}

.order-card.completing{animation:completeOut .45s ease-in forwards}
@keyframes completeOut{to{opacity:0;transform:scale(.9) translateY(8px)}}
.timer-warn{color:var(--gold)!important}
.timer-late{color:var(--red)!important}

@media(max-width:900px){#board{grid-template-columns:1fr;height:auto}.col{min-height:280px;border-right:none;border-bottom:1px solid var(--border)}}

/* ═══ SAVORELLE PREMIUM v2 — BASE TOKENS ═══ */
:root {
  --bg:     #080808;
  --bg2:    #0F0F0F;
  --bg3:    #141414;
  --surface:#161616;
  --card:   #1C1C1C;
  --card2:  #212121;
  --text:   #F5F0E8;
  --text2:  #8A8070;
  --muted:  #484038;
  --border:  rgba(249,115,22,0.08);
  --border2: rgba(249,115,22,0.16);
  --orange:  #F97316;
  --orange2: #EA6810;
  --gold:    #F0A500;
  --green:   #22C55E;
  --blue:    #3B82F6;
  --red:     #EF4444;
  --grad:    linear-gradient(135deg,#F97316,#E8620A);
}
body {
  background: #080808;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(249,115,22,0.07) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 100%, rgba(240,165,0,0.04) 0%, transparent 45%);
  font-size: 16px;
  letter-spacing: 0.01em;
}

/* ─── KITCHEN DISPLAY PREMIUM (topbar now in base CSS) ─── */
/* Banner — never overlaps topbar */
#new-order-flash { top:72px !important; background:linear-gradient(90deg,#1A3A8A,#1D4ED8,#1A3A8A) !important; border-bottom:2px solid rgba(99,143,255,0.5) !important; padding:14px 32px !important; font-size:20px !important; font-weight:700 !important; box-shadow:0 6px 32px rgba(59,130,246,0.4) !important; }
/* Board height adjustment when banner is shown */
#board { height:calc(100vh - 72px) !important; }
/* Column headers */
.col-header { padding:20px 24px !important; }
.col-title { font-size:24px !important; font-weight:800 !important; letter-spacing:-0.01em !important; }
.col-count { font-size:32px !important; font-weight:800 !important; width:52px !important; height:52px !important; border-radius:14px !important; }
/* Cards — max readability */
.order-card { background:#1A1A1A !important; border-radius:18px !important; }
.card-table-badge { font-size:30px !important; font-weight:800 !important; }
.card-order-num { font-size:14px !important; font-weight:700 !important; color:#5C4E42 !important; }
.card-item-name { font-size:20px !important; font-weight:800 !important; letter-spacing:0.03em !important; color:#F5F0E8 !important; }
.card-item-qty { font-size:36px !important; font-weight:800 !important; color:#F97316 !important; min-width:44px !important; }
.card-item-emoji { font-size:26px !important; }
.card-time-ago { font-size:15px !important; font-weight:800 !important; }
/* Action buttons */
.action-btn { padding:16px 10px !important; border-radius:14px !important; font-size:20px !important; font-weight:800 !important; letter-spacing:0.05em !important; }


/* ── WAITER CALLS ── */
#waiter-call-banner{
  position:fixed;top:72px;left:0;right:0;
  z-index:600;display:flex;flex-direction:column;gap:0;
  pointer-events:none;
  padding:0 16px;
}
.waiter-call-toast{
  background:linear-gradient(135deg,#6366F1,#4F46E5);
  border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(99,102,241,0.5);
  pointer-events:all;
  animation:wcIn .35s cubic-bezier(0.34,1.1,0.64,1);
}
@keyframes wcIn{from{opacity:0;transform:translateY(-16px) scale(.95)}to{opacity:1;transform:none}}
.wc-icon{font-size:24px;flex-shrink:0}
.wc-info{flex:1}
.wc-table{font-size:15px;font-weight:800;color:#fff}
.wc-req{font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px}
.wc-dismiss{background:rgba(255,255,255,0.2);border:none;color:#fff;
  border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap}
.wc-dismiss:hover{background:rgba(255,255,255,0.35)}


/* ── KOT PRINT ── */
.btn-print{background:rgba(148,163,184,0.1);color:#94A3B8;border:1px solid rgba(148,163,184,0.2);font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s}
.btn-print:hover{background:rgba(148,163,184,0.2);color:#fff}

@media print {
  /* Hide everything except KOT */
  body > *:not(#kot-print-frame) { display: none !important; }
  #kot-print-frame { display: block !important; }
  @page { size: 80mm auto; margin: 0; }
}
#kot-print-frame {
  display: none;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  width: 80mm;
  padding: 4mm;
  color: #000;
  background: #fff;
}
.kot-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 6px; margin-bottom: 8px; }
.kot-rest-name { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
.kot-sub { font-size: 11px; margin-top: 2px; }
.kot-divider { border: none; border-top: 1px dashed #000; margin: 6px 0; }
.kot-meta { font-size: 11px; margin-bottom: 8px; line-height: 1.8; }
.kot-meta strong { font-size: 13px; }
.kot-items-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11px; border-bottom: 1px solid #000; padding-bottom: 3px; margin-bottom: 4px; }
.kot-item-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
.kot-item-name { flex: 1; }
.kot-item-qty { font-weight: bold; min-width: 30px; text-align: right; }

let orders = [];

let _waiterStaffCache = []; // cached waiter/cashier WA numbers

function setKitchenLang(lang) {
  kitchenLang = lang;
  // Toggle button styles
  document.getElementById('k-lang-en').style.background = lang==='en' ? 'var(--orange)' : 'transparent';
  document.getElementById('k-lang-en').style.color = lang==='en' ? '#fff' : 'var(--orange)';

    en: { new:'New Orders', prep:'Preparing', ready:'Ready to Serve' },

  };

  // Re-render all cards with new language
  renderBoard();
}
let soundEnabled = true;

let timers = {};
let _alertedOrders = new Set(); // Track which orders we already alerted

function checkOverdueOrders() {
  orders.forEach(o => {
    if (_alertedOrders.has(o.id)) return;
    const mins = minutesAgo(o.timestamp);

async function loadRestaurant() {
  // Check URL param ?r=slug  OR  use logged-in owner's restaurant
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('r');

  if (slug) {

  if (session) {
    const { data } = await sb.from('restaurants').select('id,name,slug').eq('owner_id', session.user.id).maybeSingle();
    if (data) {
      restaurantId = data.id;
      document.getElementById('tb-restaurant-name').textContent = data.name + ' — Kitchen';
      document.title = data.name + ' — Kitchen Display';
      return true;

  // Fallback — show setup hint

function showSetupHint() {

      <div class="no-orders-sub">Open this page from your dashboard or add <strong>?r=your-slug</strong> to the URL.</div>
      <div class="no-orders-hint">💡 Go to Dashboard → QR Codes to get your kitchen display link.</div>`;
  }
}

/* ══════════════════════════════════════
   FETCH ORDERS FROM SUPABASE
══════════════════════════════════════ */
const _pendingUpdates = new Set(); // orders being updated — don't overwrite

async function fetchOrders() {
  if (!restaurantId) return;
  const { data, error } = await sb
    .from('orders')
    .select('*, order_items(item_name, quantity, item_price, item_name_bn)')
    .eq('restaurant_id', restaurantId)
    .in('status', ['new', 'confirmed', 'preparing', 'ready'])
    .order('created_at', { ascending: true });

  if (error) { console.error('fetchOrders:', error); return; }

  const fresh = (data || []).map(mapOrder);

  // Merge: don't overwrite orders currently being updated optimistically
  if (_pendingUpdates.size > 0) {
    const freshMap = new Map(fresh.map(o => [o._id, o]));
    orders = orders.map(local => {
      if (_pendingUpdates.has(local._id)) return local; // keep optimistic
      return freshMap.get(local._id) || local;
    });
    // Add genuinely new orders not in local
    fresh.forEach(o => {
      if (!orders.find(lo => lo._id === o._id)) orders.push(o);
    });
    // Remove orders no longer in fresh (completed/served)
    const freshIds = new Set(fresh.map(o => o._id));
    orders = orders.filter(o => _pendingUpdates.has(o._id) || freshIds.has(o._id));
  } else {
    orders = fresh;
  }

  renderBoard();
}

function mapOrder(row) {
  return {
    id:        row.order_number || ('#' + row.id.slice(0,6)),
    _id:       row.id,   // real UUID for updates
    table:     row.table_number || '—',
    items:     (row.order_items || []).map(i => ({
                 name:   i.item_name,
                 nameBn: i.item_name_bn || null,
                 qty:    i.quantity,
                 emoji:  '🍽️',
               })),
    total:     parseFloat(row.total || 0),
    note:      row.special_note || '',
    waSent:    row.wa_sent || false,
    time:      new Date(row.created_at).toLocaleTimeString('en-BD', { hour:'2-digit', minute:'2-digit' }),
    status:    row.status,
    timestamp: new Date(row.created_at).getTime(),
  };
}

/* ══════════════════════════════════════
   REALTIME SUBSCRIPTION
══════════════════════════════════════ */
function startRealtimeListener() {
  if (!restaurantId) return;

  sb.channel('kitchen-orders')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'orders',
      filter: `restaurant_id=eq.${restaurantId}`
    }, async (payload) => {
      // Fetch full order with items
      const { data } = await sb
        .from('orders')
        .select('*, order_items(item_name, quantity, item_price, item_name_bn)')
        .eq('id', payload.new.id)
        .single();
      if (data) {
        const order = mapOrder(data);
        orders.unshift(order);
        renderBoard();
        showNewOrderFlash(1);
        playBeep('new');
        triggerScreenFlash('new');
        // WhatsApp auto-send removed — owner notified via dashboard
      }
    })
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'orders',
      filter: `restaurant_id=eq.${restaurantId}`
    }, (payload) => {
      const updated = payload.new;
      // If moved to served/cancelled — remove from board
      // Clear expanded trackers when order moves
      if (updated.id === expandedNewOrderId) expandedNewOrderId = null;
      if (updated.id === expandedPrepId)    expandedPrepId = null;
      if (updated.id === expandedReadyId)   expandedReadyId = null;
      if (['served', 'cancelled'].includes(updated.status)) {
        orders = orders.filter(o => o._id !== updated.id);
      } else {
        // Update by UUID (_id), not display id
        orders = orders.map(o =>
          o._id === updated.id ? { ...o, status: updated.status } : o
        );
      }
      // Don't increment lastKnownCount — this is an UPDATE not INSERT
      renderBoard();
    })
    .subscribe((status) => {
      const dot = document.getElementById('conn-dot');
      const label = document.getElementById('conn-label');
      if (dot && label) {
        const connected = status === 'SUBSCRIBED';
        dot.style.background = connected ? '#22C55E' : '#EF4444';
        label.textContent = connected ? 'Live' : 'Connecting...';
      }
    });
}

/* ══ AUDIO ENGINE ══ */
let audioUnlocked = false;

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function unlockAudio() {
  const ctx = getAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  if (audioUnlocked) return;
  // Play silent buffer
  try {
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
  } catch(e) {}
  audioUnlocked = true;
  // Update notice → show ✅ then hide
  const notice = document.getElementById('k-audio-notice');
  if (notice) {
    notice.innerHTML = '✅ Sound ON';
    notice.style.background = 'rgba(34,197,94,0.15)';
    notice.style.borderColor = 'rgba(34,197,94,0.3)';
    notice.style.color = '#22C55E';
    setTimeout(() => { notice.style.display = 'none'; }, 2000);
  }
  // Play test beep so staff knows it works
  setTimeout(() => playBeepNow(880, 0.3, 0.15), 100);
}
document.addEventListener('click', unlockAudio);
document.addEventListener('touchstart', unlockAudio);
document.addEventListener('keydown', unlockAudio);

/* Smart beep — handles all edge cases */
function playBeep(type = 'new') {
  if (!soundEnabled) return;
  const ctx = getAudio();
  if (!ctx) return;

  const doPlay = () => {
    const configs = {
      new:   [{ f:880,t:0,d:0.12 },{ f:1100,t:0.14,d:0.12 },{ f:1320,t:0.28,d:0.18 }],
      ready: [{ f:660,t:0,d:0.15 },{ f:880,t:0.18,d:0.25 }],
      tick:  [{ f:440,t:0,d:0.08 }],
    };
    const notes = configs[type] || configs.new;
    notes.forEach(({f,t,d}) => playBeepNow(f, soundVolume*0.5, d, t));
  };

  if (ctx.state === 'suspended') {
    ctx.resume().then(doPlay).catch(()=>{});
  } else {
    doPlay();
  }
}

function playBeepNow(freq, vol, dur, offset=0) {
  const ctx = getAudio();
  if (!ctx) return;
  try {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    const t = ctx.currentTime + offset;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(Math.max(vol, 0.05), t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur + 0.05);
  } catch(e) {}
}

function triggerScreenFlash(type) {

  el.className = '';
  void el.offsetWidth; // reflow
  el.className = type === 'ready' ? 'flash-ready' : 'flash-new';
}

/* ══════════════════════════════════════
   TIME HELPERS
══════════════════════════════════════ */
function timeAgo(timestamp) {
  const diff = Math.floor((Date.now() - timestamp) / 1000);
  if (diff < 60)  return diff + 's';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  return Math.floor(diff / 3600) + 'h';
}
function minutesAgo(timestamp) {
  return Math.floor((Date.now() - timestamp) / 60000);
}
function timeClass(timestamp, status) {
  if (status === 'served') return '';
  const mins = minutesAgo(timestamp);
  if (mins >= 40) return 'timer-late';  // Critical for ANY status
  if (status === 'new' && mins >= 5)  return 'timer-late';
  if (status === 'new' && mins >= 3)  return 'timer-warn';
  if (status === 'preparing' && mins >= 20) return 'timer-late';
  if (status === 'preparing' && mins >= 12) return 'timer-warn';
  return '';
}

function priorityFlag(timestamp, status) {
  if (status === 'served') return '';
  const mins = minutesAgo(timestamp);
  if (mins >= 40) return `<span class="priority-flag critical">🔥 ${mins}m — URGENT</span>`;
  if (mins >= 25) return `<span class="priority-flag late">⚠️ ${mins}m waiting</span>`;
  if (mins >= 15) return `<span class="priority-flag warn">⏳ ${mins}m</span>`;
  return '';
}

/* ── Track which order is expanded in NEW column ── */
let expandedNewOrderId = null;

function renderCol(containerId, colOrders, status) {
  const container = document.getElementById(containerId);

  // ── NEW column: special FIFO queue rendering ──
  if (status === 'new') {
    renderNewQueue(container, colOrders);
    return;
  }

  // ── PREPARING / READY: same queue pattern ──
  if (status === 'preparing') {
    renderPrepQueue(container, colOrders);
    return;
  }
  if (status === 'ready') {
    renderReadyQueue(container, colOrders);
    return;
  }
}

/* ── Shared queue builder for prep/ready ── */
let expandedPrepId = null;
let expandedReadyId = null;

function renderPrepQueue(container, colOrders) {
  const sorted = [...colOrders].sort((a, b) => a.timestamp - b.timestamp);

  if (!sorted.length) {
    container.innerHTML = `<div class="col-empty"><div class="col-empty-icon">🍳</div><div class="col-empty-text">Nothing cooking</div></div>`;
    expandedPrepId = null;
    return;
  }

  const existsExpanded = sorted.some(o => o._id === expandedPrepId);
  if (!expandedPrepId || !existsExpanded) expandedPrepId = sorted[0]._id;

  container.innerHTML = buildQueueHtml(sorted, 'preparing', expandedPrepId);
}

function renderReadyQueue(container, colOrders) {
  const sorted = [...colOrders].sort((a, b) => a.timestamp - b.timestamp);

  if (!sorted.length) {
    container.innerHTML = `<div class="col-empty"><div class="col-empty-icon">✅</div><div class="col-empty-text">Nothing ready yet</div></div>`;
    expandedReadyId = null;
    return;
  }

  const existsExpanded = sorted.some(o => o._id === expandedReadyId);
  if (!expandedReadyId || !existsExpanded) expandedReadyId = sorted[0]._id;

  container.innerHTML = buildQueueHtml(sorted, 'ready', expandedReadyId);
}

/* ══════════════════════════════════════
   STATUS UPDATE — now writes to Supabase
══════════════════════════════════════ */
async function updateOrderStatus(orderId, newStatus) {
  // orderId = UUID (_id) always now
  const order = orders.find(o => o._id === orderId);
  if (!order) {
    console.error('Order not found by _id:', orderId);
    showToastKitchen('Order not found — please refresh');
    return;
  }

  const uuid = order._id;

  // Clear expanded trackers
  if (uuid === expandedNewOrderId || order.id === expandedNewOrderId) expandedNewOrderId = null;
  if (uuid === expandedPrepId    || order.id === expandedPrepId)    expandedPrepId = null;
  if (uuid === expandedReadyId   || order.id === expandedReadyId)   expandedReadyId = null;

  // Mark as pending
  _pendingUpdates.add(uuid);

  // Optimistic UI — always match by _id
  if (['served', 'completed', 'cancelled'].includes(newStatus)) {
    orders = orders.filter(o => o._id !== uuid);
    _pendingUpdates.delete(uuid);
  } else {
    orders = orders.map(o => o._id === uuid ? { ...o, status: newStatus } : o);
  }
  renderBoard();

  // Sound + WA
  if (newStatus === 'ready') {
    // WA already sent by markReadyAndNotify
    playBeep('ready');
    triggerScreenFlash('ready');
  } else if (newStatus !== 'new') {
    playBeep('tick');
  }

  // Write to Supabase
  const { error } = await sb.from('orders')
    .update({ status: newStatus })
    .eq('id', uuid);

  _pendingUpdates.delete(uuid);

  if (error) {
    console.error('updateOrderStatus error:', error.message);
    orders = orders.map(o => o._id === uuid ? { ...o, status: order.status } : o);
    renderBoard();
    showToastKitchen('Update failed: ' + error.message);
  }
}

/* ══ STAFF WA CACHE ══ */
async function loadStaffCache() {
  if (!restaurantId) return;
  const { data } = await sb
    .from('restaurant_staff')
    .select('name, whatsapp, role, assigned_tables, callmebot_apikey')
    .eq('restaurant_id', restaurantId)
    .eq('is_active', true)
    .in('role', ['waiter','cashier']);
  _waiterStaffCache = (data || []).filter(s => s.whatsapp && s.whatsapp.trim());
  console.log('Staff cache:', _waiterStaffCache.length, 'waiters:', _waiterStaffCache.map(w=>w.name+'→'+(w.assigned_tables||[]).join(',')));
}

/* Find which waiter is assigned to a table */
function findWaiterForTable(tableNum) {
  if (!tableNum) return null;
  const tStr = String(tableNum).trim();
  // Exact match
  const assigned = _waiterStaffCache.find(w =>
    (w.assigned_tables || []).map(t => String(t).trim()).includes(tStr)
  );
  if (assigned) return assigned;
  // No assignment — return first waiter as fallback
  return _waiterStaffCache[0] || null;
}

function formatPhone(raw) {
  let p = raw.replace(/\D/g, '');
  if (p.startsWith('0')) p = '880' + p.slice(1);
  if (!p.startsWith('880')) p = '880' + p;
  return p;
}

/* Fully automatic — finds assigned waiter, shows clickable toast */
async function sendWaiterWANow(order) {
  // Reload cache if empty
  if (!_waiterStaffCache.length) {
    await loadStaffCache();
  }
  if (!_waiterStaffCache.length) {
    showToastKitchen('⚠️ কোনো Waiter নেই — Dashboard → Staff এ WA নম্বর দিন');
    return;
  }

  const waiter = findWaiterForTable(order.table);
  if (!waiter) {
    // Show all waiters if none assigned
    showToastKitchen(`⚠️ টেবিল ${order.table} কোনো Waiter-এ assign নেই — fallback: ${_waiterStaffCache[0]?.name}`);
    const fallback = _waiterStaffCache[0];
    if (!fallback) return;
    const msg = buildReadyMsg(order, fallback.name);
    const url = `https://wa.me/${formatPhone(fallback.whatsapp)}?text=${encodeURIComponent(msg)}`;
    showAutoWaToast(fallback.name + ' (fallback)', `🍽️ টেবিল ${order.table} — অর্ডার ${order.id}`, url, 'ready');

  }

  const msg = buildReadyMsg(order, waiter.name);
  const phone = formatPhone(waiter.whatsapp);
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

  // Show toast with one-tap WA link

    waiter.name,
    `🍽️ টেবিল ${order.table} — অর্ডার ${order.id}`,
    url, 'ready'
  );
}

/* ══ CALLMEBOT: Automatic WhatsApp (no user click needed) ══ */
async function sendCallMeBot(waiter, order) {
  try {
    const itemsList = (order.items || [])
      .map(i => `${i.qty}x ${i.nameBn || i.name}`)
      .join(', ');

    const msg = `🍽️ অর্ডার রেডি! টেবিল ${order.table} → ${order.id}\n${itemsList}\n⚡ এখনই নিয়ে যান`;

    if (phone.startsWith('0')) phone = '880' + phone.slice(1);
    if (!phone.startsWith('880')) phone = '880' + phone;

    const url = `https://api.callmebot.com/whatsapp.php?phone=${phone}&text=${encodeURIComponent(msg)}&apikey=${waiter.callmebot_apikey}`;

    const res = await fetch(url);
    const text = await res.text();
    console.log('CallMeBot response:', text);

    // CallMeBot returns "Message queued" on success
    return text.toLowerCase().includes('queued') || text.toLowerCase().includes('success') || res.ok;
  } catch (e) {
    console.error('CallMeBot error:', e);
    return false;
  }
}

window.addEventListener('load', async () => {
  startClock();
  startTimerRefresh();

  // Init Supabase first
  await initSupabase();
  const loaded = await loadRestaurant();

  if (loaded) {
    await fetchOrders();
    await loadStaffCache(); // preload waiter WA numbers
    startRealtimeListener();
    startWaiterCallListener();
  }

  // Detect genuinely new orders (only in fetchOrders, not realtime updates)
  const currentCount = orders.length;
  if (lastKnownCount > 0 && currentCount > lastKnownCount) {
    const diff = currentCount - lastKnownCount;
    showNewOrderFlash(diff);
  }
  lastKnownCount = currentCount;

  // Fallback poll every 15s in case realtime misses anything
  setInterval(async () => {
    await fetchOrders();
    await loadStaffCache(); // refresh WA numbers every 15s
  }, 15000);
});

function startTimerRefresh() {
  setInterval(() => {
    document.querySelectorAll('.card-time-ago').forEach(el => {
      const card = el.closest('.order-card');
      if (!card) return;
      const orderId = card.dataset.orderId;
      const order = orders.find(o => o.id === orderId);
      if (!order) return;
      const tClass = timeClass(order.timestamp, order.status);
      el.className = `card-time-ago ${tClass}`;
      el.textContent = '⏱ ' + timeAgo(order.timestamp);
    });
  }, 30000);
}


// ── WAITER CALLS REALTIME ────────────────────────────────────
function startWaiterCallListener() {
  if (!restaurantId) return;
  sb.channel('waiter-calls-' + restaurantId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'waiter_calls',
      filter: `restaurant_id=eq.${restaurantId}`
    }, (payload) => {
      showWaiterCallToast(payload.new);
      playBeep('new');
      // Send automatic WA via CallMeBot
      const callWaiter = findWaiterForTable(payload.new.table_number) || _waiterStaffCache[0];
      if (callWaiter) {
        sendCallMeBotForCall(callWaiter, payload.new).then(sent => {
          if (!sent && callWaiter.whatsapp) {
            // Fallback manual
            sendWaiterCallWANow(payload.new);
          }
        });
      }
    })
    .subscribe();
}

function showWaiterCallToast(call) {
  const banner = document.getElementById('waiter-call-banner');
  if (!banner) return;
  const id = 'wc-' + Date.now();
  const reqMap = {
    water:'💧 Water / Drink', bill:'🧾 Bill Please',
    extra:'🍽️ Extra Items', help:'🙋 Need Help', general:'General Help'
  };
  const reqs = (call.request_type || 'general').split(', ')
    .map(r => reqMap[r] || r).join(' · ');

  const toast = document.createElement('div');
  toast.className = 'waiter-call-toast';
  toast.id = id;
  toast.innerHTML = `
    <span class="wc-icon">📣</span>
    <div class="wc-info">
      <div class="wc-table">Table ${call.table_number} — Calling Waiter!</div>
      <div class="wc-req">${reqs}</div>
    </div>
    <button class="wc-dismiss" onclick="dismissWaiterCall('${id}','${call.id||''}')">✓ Done</button>
  `;
  banner.appendChild(toast);

  // Auto-dismiss after 60 seconds
  setTimeout(() => dismissWaiterCall(id, call.id||''), 60000);
}

async function dismissWaiterCall(toastId, callId) {
  const el = document.getElementById(toastId);
  if (el) { el.style.opacity='0'; el.style.transform='scale(0.9)'; setTimeout(()=>el.remove(),300); }
  if (callId) {
    try { await sb.from('waiter_calls').update({status:'done'}).eq('id', callId); } catch(e){}
  }
}


// ── KOT PRINT ────────────────────────────────────────────────
function printKOT(orderId) {
  // orderId is now UUID (_id) — find by _id
  const order = orders.find(o => o._id === orderId) || orders.find(o => o.id === orderId);
  if (!order) { console.error('Order not found:', orderId); return; }

  const restName = document.getElementById('tb-restaurant-name')?.textContent?.replace(' — Kitchen','') || 'Restaurant';
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-BD', {hour:'2-digit', minute:'2-digit'});
  const dateStr = now.toLocaleDateString('en-BD', {day:'2-digit', month:'short', year:'numeric'});

  const itemRows = (order.items || []).map(item =>
    `<div class="kot-item-row">
      <span class="kot-item-name">${item.name}${item.nameBn ? ' / '+item.nameBn : ''}</span>
      <span class="kot-item-qty">x${item.qty}</span>
    </div>`
  ).join('');

  const noteSection = order.note
    ? `<div class="kot-note">📝 Note: ${order.note}</div>` : '';

  const frame = document.getElementById('kot-print-frame');
  frame.innerHTML = `
    <div class="kot-header">
      <div class="kot-rest-name">${restName}</div>
      <div class="kot-sub">Kitchen Order Ticket</div>
    </div>
    <div class="kot-meta">
      <strong>Order: ${order.id}</strong><br>
      Table: <strong>${order.table}</strong><br>
      Time: ${timeStr} · ${dateStr}
    </div>
    <hr class="kot-divider">
    <div class="kot-items-header">
      <span>ITEM</span><span>QTY</span>
    </div>
    ${itemRows}
    ${noteSection}
    <hr class="kot-divider">
    <div style="display:flex;justify-content:space-between;font-weight:bold;font-size:13px">
      <span>Total Items:</span>
      <span>${(order.items||[]).reduce((s,i)=>s+i.qty,0)}</span>
    </div>
    <div class="kot-footer">
      Powered by MenuQR<br>
      *** Kitchen Copy ***
    </div>
  `;

  // Trigger print
  window.print();
}

</script>

<!-- KOT Print Frame (hidden, shown only on print) -->
<div id="kot-print-frame"></div>
</body>
