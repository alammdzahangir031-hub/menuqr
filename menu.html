<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu — MenuQR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2C742F;--green2:#1E5621;--green3:#3A9E3F;
  --grad:linear-gradient(135deg,#2C742F,#3A9E3F);
  --orange:#FF6B35;
  --bg:#F7F8F5;--white:#fff;
  --text:#1A1A1A;--text2:#4B5563;--muted:#9CA3AF;
  --border:rgba(0,0,0,0.08);
  --card:#fff;
  --error:#DC2626;--success:#16A34A;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-md:0 4px 20px rgba(0,0,0,0.1);
  --radius:14px;--pill:100px;
}
html,body{height:100%;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── LOADING SCREEN ── */
#loading-screen{
  position:fixed;inset:0;background:var(--white);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px;
}
.load-logo{font-size:48px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.load-text{font-size:16px;color:var(--muted);font-weight:500}
.load-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ERROR SCREEN ── */
#error-screen{
  position:fixed;inset:0;background:var(--white);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:9998;padding:32px;text-align:center;
}
#error-screen.show{display:flex}
.error-icon{font-size:64px;margin-bottom:16px}
.error-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.error-sub{font-size:15px;color:var(--text2);line-height:1.7}

/* ── HEADER ── */
.menu-header{
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);
}
.header-restaurant{display:flex;align-items:center;gap:10px}
.header-logo{
  width:40px;height:40px;border-radius:10px;
  background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;flex-shrink:0;
}
.header-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
.header-status{font-size:12px;color:var(--success);font-weight:600;display:flex;align-items:center;gap:4px}
.status-dot{width:7px;height:7px;background:var(--success);border-radius:50%;animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.header-status.closed{color:var(--error)}
.header-status.closed .status-dot{background:var(--error);animation:none}
.cart-btn-header{
  position:relative;
  background:var(--grad);border:none;color:#fff;
  width:42px;height:42px;border-radius:12px;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(44,116,47,0.3);
  transition:transform 0.15s;
}
.cart-btn-header:hover{transform:scale(1.05)}
.cart-btn-badge{
  position:absolute;top:-6px;right:-6px;
  background:var(--orange);color:#fff;
  width:20px;height:20px;border-radius:50%;
  font-size:11px;font-weight:800;
  display:none;align-items:center;justify-content:center;
  border:2px solid var(--white);
}
.cart-btn-badge.show{display:flex}

/* ── TABLE BANNER ── */
.table-banner{
  background:linear-gradient(135deg,rgba(44,116,47,0.08),rgba(58,158,63,0.05));
  border-bottom:1px solid rgba(44,116,47,0.12);
  padding:8px 16px;
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--green2);
}

/* ── SEARCH ── */
.search-wrap{padding:12px 16px;background:var(--white);border-bottom:1px solid var(--border)}
.search-input-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--pill);padding:10px 16px;
  transition:border-color 0.2s;
}
.search-input-wrap:focus-within{border-color:var(--green)}
.search-input-wrap input{
  border:none;outline:none;font-size:14px;color:var(--text);
  font-family:'Jost',sans-serif;background:transparent;width:100%;
}
.search-input-wrap input::placeholder{color:var(--muted)}

/* ── CATEGORIES ── */
.cat-scroll{
  display:flex;gap:8px;padding:10px 16px;
  overflow-x:auto;background:var(--white);
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tab{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--pill);
  font-size:13px;font-weight:600;white-space:nowrap;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--text2);cursor:pointer;transition:all 0.15s;
  font-family:'Jost',sans-serif;flex-shrink:0;
}
.cat-tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(44,116,47,0.25)}
.cat-tab:hover:not(.active){border-color:var(--green);color:var(--green)}

/* ── MENU GRID ── */
.menu-body{padding:12px 16px 120px}
.cat-section{margin-bottom:28px}
.cat-section-title{
  font-size:16px;font-weight:800;color:var(--text);
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:2px solid rgba(44,116,47,0.12);
  display:flex;align-items:center;gap:8px;letter-spacing:-0.01em;
}
.menu-grid{display:flex;flex-direction:column;gap:10px}
.menu-item{
  background:var(--white);border-radius:var(--radius);
  border:1.5px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:12px;cursor:pointer;
  transition:all 0.2s;position:relative;overflow:hidden;
}
.menu-item:hover{border-color:rgba(44,116,47,0.3);box-shadow:var(--shadow-md);transform:translateX(2px)}
.menu-item.sold-out{opacity:0.5;pointer-events:none}
.item-emoji{
  width:60px;height:60px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;flex-shrink:0;
  background:var(--bg);position:relative;
}
.sold-out-tag{
  position:absolute;inset:0;background:rgba(0,0,0,0.55);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;letter-spacing:0.05em;
}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.item-name-bn{font-size:12px;color:var(--muted);font-family:'Hind Siliguri',sans-serif;margin-bottom:4px}
.item-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.ibadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--pill)}
.ibadge.best{background:rgba(251,191,36,0.15);color:#D97706}
.ibadge.spicy{background:rgba(220,38,38,0.1);color:var(--error)}
.ibadge.veg{background:rgba(22,163,74,0.1);color:var(--success)}
.ibadge.newbadge{background:rgba(37,99,235,0.1);color:#2563EB}
.ibadge.chef{background:rgba(139,92,246,0.12);color:#7C3AED}
.item-price{font-size:16px;font-weight:800;color:var(--green)}
.item-add{
  flex-shrink:0;
  width:34px;height:34px;border-radius:10px;
  background:var(--grad);border:none;color:#fff;
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(44,116,47,0.25);
  transition:transform 0.15s;font-family:'Jost',sans-serif;
}
.item-add:hover{transform:scale(1.1)}
.item-add.in-cart{background:linear-gradient(135deg,#FF6B35,#FF8C42)}

/* Qty counter inline */
.qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{
  width:28px;height:28px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--white);
  font-size:16px;cursor:pointer;color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;font-family:'Jost',sans-serif;
}
.qty-btn:hover{border-color:var(--green);color:var(--green)}
.qty-num{font-size:14px;font-weight:700;color:var(--text);min-width:20px;text-align:center}

/* ── EMPTY SEARCH ── */
.empty-search{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-search .e-icon{font-size:48px;margin-bottom:12px}
.empty-search p{font-size:14px}

/* ── CART DRAWER ── */
.cart-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.45);
  z-index:500;display:none;
  backdrop-filter:blur(2px);
}
.cart-overlay.show{display:block}
.cart-drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-radius:20px 20px 0 0;
  z-index:501;max-height:90vh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 -8px 40px rgba(0,0,0,0.15);
}
.cart-drawer.open{transform:translateY(0)}
.cart-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--border);margin:12px auto 0;flex-shrink:0;
}
.cart-header{
  padding:12px 20px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.cart-title{font-size:18px;font-weight:800;color:var(--text)}
.cart-close{
  background:var(--bg);border:1px solid var(--border);
  width:32px;height:32px;border-radius:8px;
  font-size:16px;cursor:pointer;color:var(--text2);
  display:flex;align-items:center;justify-content:center;
}
.cart-items{flex:1;overflow-y:auto;padding:12px 20px}
.cart-items::-webkit-scrollbar{width:3px}
.cart-items::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cart-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.cart-item:last-child{border-bottom:none}
.ci-emoji{font-size:28px;width:40px;text-align:center}
.ci-info{flex:1}
.ci-name{font-size:14px;font-weight:600;color:var(--text)}
.ci-price{font-size:13px;color:var(--text2)}
.ci-controls{display:flex;align-items:center;gap:8px}
.ci-btn{
  width:26px;height:26px;border-radius:7px;
  border:1.5px solid var(--border);background:var(--white);
  font-size:14px;cursor:pointer;color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.ci-btn:hover{border-color:var(--green);color:var(--green)}
.ci-btn.remove:hover{border-color:var(--error);color:var(--error)}
.ci-qty{font-size:14px;font-weight:700;color:var(--text);min-width:20px;text-align:center}
.ci-subtotal{font-size:14px;font-weight:700;color:var(--green);min-width:55px;text-align:right}

.cart-footer{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:14px;color:var(--text2);font-weight:500}
.cart-total-amount{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.02em}

/* Table input */
.table-field{margin-bottom:10px}
.table-field label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px}
.table-input{
  width:100%;border:1.5px solid var(--border);border-radius:10px;
  padding:11px 14px;font-size:15px;color:var(--text);
  font-family:'Jost',sans-serif;outline:none;
  transition:border-color 0.2s;
}
.table-input:focus{border-color:var(--green)}
.table-input.error{border-color:var(--error)}
.table-input::placeholder{color:var(--muted)}
textarea.table-input{resize:none;height:70px;font-size:13px}

.place-order-btn{
  width:100%;padding:15px;
  background:var(--grad);border:none;border-radius:var(--pill);
  color:#fff;font-size:16px;font-weight:700;
  font-family:'Jost',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(44,116,47,0.3);
  transition:all 0.2s;position:relative;overflow:hidden;
}
.place-order-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(44,116,47,0.4)}
.place-order-btn:disabled{opacity:0.65;cursor:not-allowed;transform:none}
.place-order-btn .btn-spinner{
  display:none;width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
  border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;
}

/* ── SUCCESS SCREEN ── */
#success-screen{
  position:fixed;inset:0;background:var(--white);
  z-index:999;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px;text-align:center;
}
#success-screen.show{display:flex}
.success-anim{font-size:80px;animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-size:26px;font-weight:800;color:var(--text);margin:16px 0 8px;letter-spacing:-0.02em}
.success-sub{font-size:15px;color:var(--text2);line-height:1.7;max-width:300px;margin:0 auto}
.success-order-id{
  margin:20px 0;padding:12px 24px;
  background:rgba(44,116,47,0.08);border:1px solid rgba(44,116,47,0.2);
  border-radius:var(--pill);font-size:18px;font-weight:800;color:var(--green);
  letter-spacing:0.04em;
}
.success-eta{
  display:flex;align-items:center;gap:8px;
  font-size:14px;color:var(--text2);margin-bottom:28px;
}
.btn-order-more{
  padding:13px 32px;background:var(--grad);border:none;
  border-radius:var(--pill);color:#fff;font-size:15px;font-weight:700;
  font-family:'Jost',sans-serif;cursor:pointer;
  box-shadow:0 4px 16px rgba(44,116,47,0.3);
}

/* ── STICKY CART BAR ── */
.sticky-cart{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 16px;background:var(--white);
  border-top:1px solid var(--border);
  z-index:400;display:none;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}
.sticky-cart.show{display:block}
.sticky-cart-btn{
  width:100%;padding:14px;
  background:var(--grad);border:none;border-radius:var(--pill);
  color:#fff;font-size:15px;font-weight:700;
  font-family:'Jost',sans-serif;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 16px rgba(44,116,47,0.3);
}
.sticky-cart-left{display:flex;align-items:center;gap:10px}
.sticky-cart-count{
  background:rgba(255,255,255,0.25);
  border-radius:var(--pill);padding:3px 9px;
  font-size:13px;font-weight:700;
}

/* ── LANG TOGGLE ── */
.lang-toggle{
  position:fixed;bottom:80px;right:16px;
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--pill);padding:4px;
  display:flex;gap:2px;z-index:300;
  box-shadow:var(--shadow-md);
}
.lang-btn{
  padding:5px 10px;border-radius:var(--pill);
  font-size:12px;font-weight:700;cursor:pointer;
  border:none;background:transparent;color:var(--muted);
  font-family:'Jost',sans-serif;transition:all 0.15s;
}
.lang-btn.active{background:var(--green);color:#fff}

/* ── TOAST ── */
.toast-fixed{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--text);color:#fff;
  padding:10px 20px;border-radius:var(--pill);
  font-size:14px;font-weight:600;
  opacity:0;transition:all 0.3s;pointer-events:none;
  z-index:600;white-space:nowrap;
  box-shadow:var(--shadow-md);
}
.toast-fixed.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-fixed.green{background:var(--green)}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  .menu-body{max-width:500px;margin:0 auto}
  .cart-drawer{max-width:500px;left:50%;right:auto;transform:translateX(-50%) translateY(100%);border-radius:20px}
  .cart-drawer.open{transform:translateX(-50%) translateY(0)}
  .sticky-cart{max-width:500px;left:50%;transform:translateX(-50%);border-radius:16px 16px 0 0}
  .lang-toggle{bottom:90px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="load-logo">🍽️</div>
  <div class="load-spinner"></div>
  <div class="load-text">Loading menu...</div>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="error-icon">😕</div>
  <div class="error-title" id="error-title">Restaurant not found</div>
  <div class="error-sub" id="error-sub">This menu link may be invalid or the restaurant is no longer active.</div>
</div>

<!-- Header -->
<div id="menu-header" class="menu-header" style="display:none">
  <div class="header-restaurant">
    <div class="header-logo" id="header-logo">R</div>
    <div>
      <div class="header-name" id="header-name">Restaurant</div>
      <div class="header-status" id="header-status">
        <div class="status-dot"></div>
        <span id="header-status-text">Open Now</span>
      </div>
    </div>
  </div>
  <button class="cart-btn-header" onclick="openCart()">
    🛒
    <span class="cart-btn-badge" id="header-cart-badge">0</span>
  </button>
</div>

<!-- Table banner -->
<div id="table-banner" class="table-banner" style="display:none">
  🪑 <span id="table-banner-text">Table —</span>
</div>

<!-- Search -->
<div class="search-wrap" id="search-wrap" style="display:none">
  <div class="search-input-wrap">
    <span style="color:var(--muted);font-size:16px">🔍</span>
    <input type="text" placeholder="Search menu..." id="search-input" oninput="doSearch()">
  </div>
</div>

<!-- Categories -->
<div class="cat-scroll" id="cat-scroll" style="display:none"></div>

<!-- Menu body -->
<div class="menu-body" id="menu-body" style="display:none"></div>

<!-- Sticky cart bar -->
<div class="sticky-cart" id="sticky-cart">
  <button class="sticky-cart-btn" onclick="openCart()">
    <div class="sticky-cart-left">
      <span class="sticky-cart-count" id="sticky-cart-count">0</span>
      <span id="sticky-cart-text">View Cart</span>
    </div>
    <span id="sticky-cart-total">৳0</span>
  </button>
</div>

<!-- Lang toggle -->
<div class="lang-toggle" id="lang-toggle" style="display:none">
  <button class="lang-btn active" onclick="setLang('en')" id="lang-en">EN</button>
  <button class="lang-btn" onclick="setLang('bn')" id="lang-bn">বাং</button>
</div>

<!-- Toast -->
<div class="toast-fixed" id="toast"></div>

<!-- Cart overlay -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

<!-- Cart drawer -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-handle"></div>
  <div class="cart-header">
    <span class="cart-title">Your Order</span>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="cart-total-amount">৳0</span>
    </div>
    <div class="table-field">
      <label id="label-table">Table Number</label>
      <input class="table-input" type="text" id="table-input" placeholder="e.g. 5 or A1">
    </div>
    <div class="table-field">
      <label id="label-note">Special Instructions</label>
      <textarea class="table-input" id="special-note" placeholder="Allergies, spice level, etc."></textarea>
    </div>
    <button class="place-order-btn" id="place-order-btn" onclick="placeOrder()">
      <span id="order-btn-text">Place Order 🍽️</span>
      <div class="btn-spinner" id="order-spinner"></div>
    </button>
  </div>
</div>

<!-- Success screen -->
<div id="success-screen">
  <div class="success-anim">✅</div>
  <div class="success-title" id="success-title">Order Placed!</div>
  <div class="success-sub" id="success-sub">Your kitchen is preparing your food right now.</div>
  <div class="success-order-id" id="success-order-id">#0001</div>
  <div class="success-eta">⏱️ Estimated time: <strong>15–20 minutes</strong></div>
  <button class="btn-order-more" onclick="resetOrder()">Order More →</button>
</div>

<script>
// ══ SUPABASE ══
const { createClient } = supabase;
const sb = createClient(
  'https://jkskdvvisfmezcqvamfy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imprc2tkdnZpc2ZtZXpjcXZhbWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTYzNzMsImV4cCI6MjA4ODI3MjM3M30.AxQwKmgaMdRcGyVXDPkZwnjTTqWk9nku0EvCpE37Ve4'
);

// ══ STATE ══
let restaurant = null;
let categories = [];
let menuItems = [];
let cart = {};           // { itemId: quantity }
let currentLang = 'en';
let currentCategory = 'all';
let searchQuery = '';
let tableNumber = '';

// ══ URL PARAMS ══
const params = new URLSearchParams(window.location.search);
const restaurantSlug = params.get('r');
const tableParam = params.get('t');

// ══ INIT ══
(async () => {
  if (tableParam) {
    tableNumber = tableParam;
    document.getElementById('table-input').value = tableParam;
    document.getElementById('table-banner').style.display = 'flex';
    document.getElementById('table-banner-text').textContent = `Table ${tableParam}`;
  }

  if (!restaurantSlug) {
    showError('Invalid Menu Link', 'No restaurant specified in this QR code URL.');
    return;
  }

  await loadRestaurant();
})();

async function loadRestaurant() {
  try {
    // Load restaurant
    const { data: rest, error: restErr } = await sb
      .from('restaurants')
      .select('*')
      .eq('slug', restaurantSlug)
      .eq('is_active', true)
      .single();

    if (restErr || !rest) {
      showError('Restaurant Not Found', 'This restaurant is no longer active or the link is invalid.');
      return;
    }
    restaurant = rest;

    // Load categories
    const { data: cats } = await sb
      .from('categories')
      .select('*')
      .eq('restaurant_id', rest.id)
      .eq('is_active', true)
      .order('sort_order');
    categories = cats || [];

    // Load menu items
    const { data: items } = await sb
      .from('menu_items')
      .select('*')
      .eq('restaurant_id', rest.id)
      .eq('is_available', true)
      .order('sort_order');
    menuItems = items || [];

    renderRestaurantHeader();
    renderCategories();
    renderMenu();
    showMenuUI();
    hideLoading();

    // Update page title
    document.title = `${rest.name} — Menu`;

  } catch (err) {
    showError('Something went wrong', err.message);
  }
}

function renderRestaurantHeader() {
  document.getElementById('header-name').textContent = restaurant.name;
  document.getElementById('header-logo').textContent = restaurant.name[0].toUpperCase();

  const isOpen = restaurant.is_open && restaurant.accept_orders;
  const statusEl = document.getElementById('header-status');
  const statusText = document.getElementById('header-status-text');
  if (!isOpen) {
    statusEl.classList.add('closed');
    statusText.textContent = 'Currently Closed';
  }
}

function renderCategories() {
  const scroll = document.getElementById('cat-scroll');
  const allTab = `<button class="cat-tab active" data-cat="all" onclick="selectCat('all',this)">🍽️ All</button>`;
  const catTabs = categories.map(c =>
    `<button class="cat-tab" data-cat="${c.id}" onclick="selectCat('${c.id}',this)">${c.emoji||'🍽️'} ${currentLang==='bn'&&c.name_bn?c.name_bn:c.name}</button>`
  ).join('');
  scroll.innerHTML = allTab + catTabs;
}

function selectCat(catId, btn) {
  currentCategory = catId;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  searchQuery = '';
  document.getElementById('search-input').value = '';
  renderMenu();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function doSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
  currentCategory = 'all';
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.cat-tab[data-cat="all"]')?.classList.add('active');
  renderMenu();
}

function renderMenu() {
  const body = document.getElementById('menu-body');

  let filtered = menuItems;

  // Filter by search
  if (searchQuery) {
    filtered = menuItems.filter(item =>
      item.name.toLowerCase().includes(searchQuery) ||
      (item.name_bn||'').includes(searchQuery) ||
      (item.description||'').toLowerCase().includes(searchQuery)
    );
    if (!filtered.length) {
      body.innerHTML = `<div class="empty-search"><div class="e-icon">🔍</div><p>No items found for "<strong>${searchQuery}</strong>"</p></div>`;
      return;
    }
    // Show flat list when searching
    body.innerHTML = `<div class="menu-grid">${filtered.map(item => renderItem(item)).join('')}</div>`;
    return;
  }

  // Group by category
  if (currentCategory === 'all') {
    if (!categories.length) {
      // No categories — show flat list
      body.innerHTML = `<div class="cat-section"><div class="menu-grid">${menuItems.map(renderItem).join('')}</div></div>`;
      return;
    }
    const sections = categories.map(cat => {
      const items = menuItems.filter(i => i.category_id === cat.id);
      if (!items.length) return '';
      const title = currentLang === 'bn' && cat.name_bn ? cat.name_bn : cat.name;
      return `<div class="cat-section" id="section-${cat.id}">
        <div class="cat-section-title">${cat.emoji||'🍽️'} ${title}</div>
        <div class="menu-grid">${items.map(renderItem).join('')}</div>
      </div>`;
    }).join('');
    // Uncategorized items
    const uncategorized = menuItems.filter(i => !i.category_id);
    const uncatSection = uncategorized.length
      ? `<div class="cat-section"><div class="cat-section-title">🍽️ Other</div><div class="menu-grid">${uncategorized.map(renderItem).join('')}</div></div>`
      : '';
    body.innerHTML = sections + uncatSection;
  } else {
    const items = menuItems.filter(i => i.category_id === currentCategory);
    const cat = categories.find(c => c.id === currentCategory);
    const title = currentLang === 'bn' && cat?.name_bn ? cat.name_bn : (cat?.name || 'Items');
    body.innerHTML = `<div class="cat-section">
      <div class="cat-section-title">${cat?.emoji||'🍽️'} ${title}</div>
      <div class="menu-grid">${items.map(renderItem).join('')}</div>
    </div>`;
  }
}

function renderItem(item) {
  const qty = cart[item.id] || 0;
  const name = currentLang === 'bn' && item.name_bn ? item.name_bn : item.name;
  const desc = item.description || '';
  const badges = [
    item.is_best_seller ? `<span class="ibadge best">⭐ Best Seller</span>` : '',
    item.is_chefs_pick  ? `<span class="ibadge chef">👨‍🍳 Chef's Pick</span>` : '',
    item.is_spicy       ? `<span class="ibadge spicy">🌶️ Spicy</span>` : '',
    item.is_veg         ? `<span class="ibadge veg">🥦 Veg</span>` : '',
    item.is_new         ? `<span class="ibadge newbadge">🆕 New</span>` : '',
  ].filter(Boolean).join('');

  const qtyControl = qty > 0
    ? `<div class="qty-wrap">
        <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',-1)">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="event.stopPropagation();changeQty('${item.id}',1)">+</button>
      </div>`
    : `<button class="item-add" onclick="event.stopPropagation();addToCart('${item.id}')" title="Add to cart">+</button>`;

  return `<div class="menu-item${item.is_sold_out?' sold-out':''}" onclick="addToCart('${item.id}')">
    <div class="item-emoji">
      ${item.emoji || '🍽️'}
      ${item.is_sold_out ? '<div class="sold-out-tag">SOLD OUT</div>' : ''}
    </div>
    <div class="item-info">
      ${badges ? `<div class="item-badges">${badges}</div>` : ''}
      <div class="item-name">${name}</div>
      ${item.name_bn && currentLang === 'en' ? `<div class="item-name-bn">${item.name_bn}</div>` : ''}
      ${desc ? `<div class="item-desc">${desc}</div>` : ''}
      <div class="item-price">৳${parseFloat(item.price).toLocaleString()}</div>
    </div>
    ${qtyControl}
  </div>`;
}

// ══ CART ══
function addToCart(itemId) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item || item.is_sold_out) return;
  cart[itemId] = (cart[itemId] || 0) + 1;
  updateCartUI();
  renderMenu();
  showToast(`${item.name} added!`, 'green');
}

function changeQty(itemId, delta) {
  cart[itemId] = (cart[itemId] || 0) + delta;
  if (cart[itemId] <= 0) delete cart[itemId];
  updateCartUI();
  renderMenu();
  if (Object.keys(cart).length === 0) closeCart();
}

function updateCartUI() {
  const totalQty = Object.values(cart).reduce((a,b)=>a+b, 0);
  const totalPrice = Object.entries(cart).reduce((a,[id,qty]) => {
    const item = menuItems.find(i => i.id === id);
    return a + (item ? parseFloat(item.price) * qty : 0);
  }, 0);

  // Header badge
  const badge = document.getElementById('header-cart-badge');
  badge.textContent = totalQty;
  badge.classList.toggle('show', totalQty > 0);

  // Sticky cart
  const sticky = document.getElementById('sticky-cart');
  sticky.classList.toggle('show', totalQty > 0);
  document.getElementById('sticky-cart-count').textContent = totalQty;
  document.getElementById('sticky-cart-text').textContent = `View Cart (${totalQty} item${totalQty!==1?'s':''})`;
  document.getElementById('sticky-cart-total').textContent = `৳${totalPrice.toLocaleString()}`;

  // Cart total
  document.getElementById('cart-total-amount').textContent = `৳${totalPrice.toLocaleString()}`;
}

function openCart() {
  if (!Object.keys(cart).length) { showToast('Your cart is empty'); return; }
  renderCartItems();
  document.getElementById('cart-overlay').classList.add('show');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('show');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCartItems() {
  const list = document.getElementById('cart-items-list');
  const entries = Object.entries(cart);
  list.innerHTML = entries.map(([id, qty]) => {
    const item = menuItems.find(i => i.id === id);
    if (!item) return '';
    const subtotal = parseFloat(item.price) * qty;
    const name = currentLang === 'bn' && item.name_bn ? item.name_bn : item.name;
    return `<div class="cart-item">
      <div class="ci-emoji">${item.emoji||'🍽️'}</div>
      <div class="ci-info">
        <div class="ci-name">${name}</div>
        <div class="ci-price">৳${parseFloat(item.price).toLocaleString()} each</div>
      </div>
      <div class="ci-controls">
        <button class="ci-btn remove" onclick="changeQty('${id}',-1)">−</button>
        <span class="ci-qty">${qty}</span>
        <button class="ci-btn" onclick="changeQty('${id}',1)">+</button>
      </div>
      <div class="ci-subtotal">৳${subtotal.toLocaleString()}</div>
    </div>`;
  }).join('');
  updateCartUI();
}

// ══ PLACE ORDER ══
async function placeOrder() {
  const tableVal = document.getElementById('table-input').value.trim() || tableNumber;
  const note = document.getElementById('special-note').value.trim();

  // Validate table number if restaurant requires it
  if (restaurant.require_table && !tableVal) {
    document.getElementById('table-input').classList.add('error');
    showToast('Please enter your table number');
    return;
  }
  document.getElementById('table-input').classList.remove('error');

  if (!Object.keys(cart).length) { showToast('Your cart is empty'); return; }

  // Set loading state
  const btn = document.getElementById('place-order-btn');
  const btnText = document.getElementById('order-btn-text');
  const spinner = document.getElementById('order-spinner');
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';

  try {
    // Build order items
    const orderItemsData = Object.entries(cart).map(([id, qty]) => {
      const item = menuItems.find(i => i.id === id);
      return {
        menu_item_id: id,
        item_name: item.name,
        item_price: parseFloat(item.price),
        quantity: qty,
      };
    });

    const subtotal = orderItemsData.reduce((a,i) => a + i.item_price * i.quantity, 0);

    // 1. Insert order
    const { data: order, error: orderErr } = await sb.from('orders').insert({
      restaurant_id: restaurant.id,
      table_number: tableVal || null,
      special_note: note || null,
      subtotal,
      total: subtotal,
      status: 'new',
    }).select().single();

    if (orderErr) throw orderErr;

    // 2. Insert order items
    const itemsWithOrderId = orderItemsData.map(i => ({ ...i, order_id: order.id }));
    const { error: itemsErr } = await sb.from('order_items').insert(itemsWithOrderId);
    if (itemsErr) throw itemsErr;

    // 3. Send WhatsApp notification to kitchen
    sendWhatsAppAlert(order, orderItemsData, tableVal);

    // 4. Show success
    closeCart();
    showSuccess(order.order_number, tableVal);

  } catch (err) {
    showToast(`Order failed: ${err.message}`, 'error');
    console.error(err);
  } finally {
    btn.disabled = false;
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
  }
}

// ══ WHATSAPP ALERT ══
// Builds the WhatsApp message and saves it to Supabase order row.
// Kitchen staff tap "Send to WhatsApp" button on dashboard/kitchen display.
// We do NOT open WhatsApp on the customer's phone.
function buildWhatsAppMessage(order, items, tableNum, note) {
  const itemsList = items.map(i =>
    `  • ${i.quantity}x ${i.item_name} — ৳${(i.item_price * i.quantity).toLocaleString()}`
  ).join('\n');
  const total = items.reduce((a,i) => a + i.item_price * i.quantity, 0);
  return `🛎️ *NEW ORDER ${order.order_number}*
🪑 Table: ${tableNum || '—'}
⏰ ${new Date().toLocaleTimeString('en-BD', { hour:'2-digit', minute:'2-digit' })}

*Items:*
${itemsList}

💰 *Total: ৳${total.toLocaleString()}*${note ? `\n📝 Note: ${note}` : ''}

_Powered by MenuQR_`;
}

// Helper used by dashboard & kitchen to open WhatsApp with pre-filled order
function openWhatsAppForOrder(order, whatsappNumber) {
  let phone = (whatsappNumber || '').replace(/\D/g, '');
  if (phone.startsWith('0')) phone = '880' + phone.slice(1);
  if (!phone.startsWith('880')) phone = '880' + phone;
  const msg = order.wa_message || `🛎️ New Order ${order.order_number} — Table ${order.table_number}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
}

async function sendWhatsAppAlert(order, items, tableNum) {
  // Save the pre-built message to the order row so dashboard/kitchen can use it
  const note = document.getElementById('special-note').value.trim();
  const msg = buildWhatsAppMessage(order, items, tableNum, note);
  try {
    await sb.from('orders').update({ wa_message: msg }).eq('id', order.id);
  } catch(e) {
    console.warn('Could not save wa_message:', e);
  }
}

function showSuccess(orderNum, tableNum) {
  cart = {};
  updateCartUI();
  document.getElementById('success-order-id').textContent = orderNum || '#—';
  document.getElementById('success-sub').textContent =
    `Your order is confirmed! Kitchen will prepare it shortly.${tableNum ? ` Table ${tableNum}.` : ''}`;
  document.getElementById('success-screen').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function resetOrder() {
  document.getElementById('success-screen').classList.remove('show');
  document.body.style.overflow = '';
  renderMenu();
}

// ══ LANGUAGE ══
function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-bn').classList.toggle('active', lang === 'bn');
  renderCategories();
  renderMenu();
  // Update labels
  if (lang === 'bn') {
    document.getElementById('label-table').textContent = 'টেবিল নম্বর';
    document.getElementById('label-note').textContent = 'বিশেষ নির্দেশনা';
    document.getElementById('order-btn-text').textContent = 'অর্ডার দিন 🍽️';
  } else {
    document.getElementById('label-table').textContent = 'Table Number';
    document.getElementById('label-note').textContent = 'Special Instructions';
    document.getElementById('order-btn-text').textContent = 'Place Order 🍽️';
  }
}

// ══ UI HELPERS ══
function showMenuUI() {
  ['menu-header','search-wrap','cat-scroll','menu-body','lang-toggle'].forEach(id => {
    document.getElementById(id).style.display = '';
  });
  if (tableParam) document.getElementById('table-banner').style.display = 'flex';
  document.getElementById('lang-toggle').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loading-screen').style.display = 'none';
}

function showError(title, sub) {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-sub').textContent = sub;
  document.getElementById('error-screen').classList.add('show');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast-fixed show${type ? ' ' + type : ''}`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
